name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: transit
          POSTGRES_PASSWORD: transit
          POSTGRES_DB: transit_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://transit:transit@localhost:5432/transit_db
          REDIS_URL: redis://localhost:6379/0
          TDX_CLIENT_ID: dummy
          TDX_CLIENT_SECRET: dummy
          APP_ENV: test
          DEBUG: "false"
        run: pytest tests/ -v --tb=short
